---
- name: Validate that openshift_agent_install_version is set
  ansible.builtin.assert:
    that:
      - openshift_agent_install_version | length > 0
    fail_msg: "openshift_agent_install_version must be set (e.g. '4.20.14')"

- name: Create working directory
  ansible.builtin.file:
    path: "{{ openshift_agent_install_work_dir }}"
    state: directory
    mode: "0755"

- name: Download sha256sum.txt
  ansible.builtin.get_url:
    url: "{{ openshift_agent_install_checksum_url }}"
    dest: "{{ openshift_agent_install_work_dir }}/sha256sum.txt"
    mode: "0644"
  when: openshift_agent_install_verify_checksum

# --- GPG signature verification ---

- name: Validate that gpg_key is set when GPG verification is enabled
  ansible.builtin.assert:
    that:
      - openshift_agent_install_gpg_key | length > 0
    fail_msg: >-
      openshift_agent_install_gpg_key must be set when
      openshift_agent_install_verify_gpg is true (URL or file path)
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg

- name: Create isolated GPG home directory
  ansible.builtin.file:
    path: "{{ openshift_agent_install_work_dir }}/.gnupg"
    state: directory
    mode: "0700"
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg

- name: Download GPG public key from URL
  ansible.builtin.get_url:
    url: "{{ openshift_agent_install_gpg_key }}"
    dest: "{{ openshift_agent_install_work_dir }}/.gnupg/signing-key.pub"
    mode: "0644"
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg
    - openshift_agent_install_gpg_key is match('^https?://')

- name: Copy local GPG public key
  ansible.builtin.copy:
    src: "{{ openshift_agent_install_gpg_key }}"
    dest: "{{ openshift_agent_install_work_dir }}/.gnupg/signing-key.pub"
    mode: "0644"
    remote_src: true
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg
    - openshift_agent_install_gpg_key is not match('^https?://')

- name: Import GPG public key
  ansible.builtin.command:
    cmd: >-
      gpg --batch --no-tty
      --homedir {{ openshift_agent_install_work_dir }}/.gnupg
      --import {{ openshift_agent_install_work_dir }}/.gnupg/signing-key.pub
  changed_when: true
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg

- name: Download GPG signature for sha256sum.txt
  ansible.builtin.get_url:
    url: "{{ openshift_agent_install_checksum_signature_url }}"
    dest: "{{ openshift_agent_install_work_dir }}/sha256sum.txt.sig"
    mode: "0644"
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg

- name: Verify GPG signature on sha256sum.txt
  ansible.builtin.shell:
    cmd: >-
      gpg --batch --no-tty
      --homedir {{ openshift_agent_install_work_dir }}/.gnupg
      --verify
      {{ openshift_agent_install_work_dir }}/sha256sum.txt.sig
      {{ openshift_agent_install_work_dir }}/sha256sum.txt
      ||
      gpg --batch --no-tty
      --homedir {{ openshift_agent_install_work_dir }}/.gnupg
      --verify
      {{ openshift_agent_install_work_dir }}/sha256sum.txt.sig
  changed_when: false
  when:
    - openshift_agent_install_verify_checksum
    - openshift_agent_install_verify_gpg

# --- Checksum extraction ---

- name: Read sha256sum.txt
  ansible.builtin.slurp:
    src: "{{ openshift_agent_install_work_dir }}/sha256sum.txt"
  register: _sha256sum_content
  when: openshift_agent_install_verify_checksum

- name: Extract checksum for tarball
  ansible.builtin.set_fact:
    _tarball_checksum: >-
      sha256:{{ (_sha256sum_content.content | b64decode)
        | regex_search('([a-f0-9]{64})\s+' ~ (openshift_agent_install_tarball_url | basename), '\1')
        | first }}
  when: openshift_agent_install_verify_checksum

# --- Download and extract ---

- name: Download openshift-install tarball
  ansible.builtin.get_url:
    url: "{{ openshift_agent_install_tarball_url }}"
    dest: "{{ openshift_agent_install_work_dir }}/openshift-install-linux.tar.gz"
    checksum: "{{ _tarball_checksum | default(omit) }}"
    mode: "0644"

- name: Extract openshift-install
  ansible.builtin.unarchive:
    src: "{{ openshift_agent_install_work_dir }}/openshift-install-linux.tar.gz"
    dest: "{{ openshift_agent_install_work_dir }}"
    remote_src: true
    include:
      - openshift-install
    mode: "0755"
    creates: "{{ openshift_agent_install_work_dir }}/openshift-install"

- name: Set resolved paths as facts
  ansible.builtin.set_fact:
    openshift_agent_install_work_dir_resolved: "{{ openshift_agent_install_work_dir }}"
    openshift_install_binary: "{{ openshift_agent_install_work_dir }}/openshift-install"
