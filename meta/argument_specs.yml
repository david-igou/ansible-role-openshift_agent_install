---
argument_specs:
  main:
    short_description: Download openshift-install and render agent-based installer manifests
    options:
      openshift_agent_install_version:
        description: >-
          OpenShift version to install (e.g. "4.20.14").
        type: str
        required: true

      openshift_agent_install_arch:
        description: >-
          Architecture for the openshift-install binary.
        type: str
        default: x86_64

      openshift_agent_install_mirror_url:
        description: >-
          Base mirror URL for downloading the openshift-install tarball.
        type: str
        default: https://mirror.openshift.com/pub/openshift-v4

      openshift_agent_install_tarball_url:
        description: >-
          Full URL to the openshift-install tarball.
          Constructed automatically from version, arch, and mirror_url.
          Override to use a completely custom URL.
        type: str

      openshift_agent_install_work_dir:
        description: >-
          Working directory for all role artifacts (binary, configs, boot artifacts).
        type: str

      openshift_agent_install_config:
        description: >-
          Dictionary representing the contents of install-config.yaml.
          Converted directly to YAML via to_nice_yaml.
        type: dict
        required: true

      openshift_agent_install_agent_config:
        description: >-
          Dictionary representing the contents of agent-config.yaml.
          Converted directly to YAML via to_nice_yaml.
        type: dict
        required: true

      openshift_agent_install_verify_checksum:
        description: >-
          Verify the SHA256 checksum of the downloaded tarball against sha256sum.txt.
          Disable for sources that do not publish sha256sum.txt.
        type: bool
        default: true

      openshift_agent_install_checksum_url:
        description: >-
          URL to the sha256sum.txt file for checksum verification.
          Auto-constructed from mirror_url, arch, and version for OCP.
          Override for OKD or custom mirrors that host sha256sum.txt at
          a different path.
        type: str

      openshift_agent_install_verify_gpg:
        description: >-
          Verify the GPG signature on sha256sum.txt before trusting its checksums.
          Requires gpg on the target host and openshift_agent_install_gpg_key
          to be set. Only effective when verify_checksum is also true.
        type: bool
        default: false

      openshift_agent_install_gpg_key:
        description: >-
          GPG public key for signature verification. Can be a URL (http/https)
          or a file path on the target host.
          OCP example: "https://www.redhat.com/security/data/fd431d51.txt"
        type: str
        default: ""

      openshift_agent_install_checksum_signature_url:
        description: >-
          URL to the detached GPG signature file for sha256sum.txt.
          OCP mirrors publish sha256sum.txt.gpg (binary format),
          OKD publishes sha256sum.txt.asc (ASCII-armored).
          Auto-constructed for OCP; override for OKD or custom mirrors.
        type: str

      openshift_agent_install_validate_oc:
        description: >-
          Validate that the oc client is available on PATH before running
          openshift-install. openshift-install calls oc internally to extract
          release metadata.
        type: bool
        default: true

      openshift_agent_install_output_type:
        description: >-
          Type of agent artifacts to generate.
          "pxe-files" produces PXE/iPXE boot artifacts,
          "image" produces a bootable agent ISO.
        type: str
        default: pxe-files
        choices:
          - pxe-files
          - image

      openshift_agent_install_additional_manifests:
        description: >-
          List of additional manifests to place in the openshift/ directory.
          Each item must have a file_name and contents key.
        type: list
        elements: dict
        default: []
