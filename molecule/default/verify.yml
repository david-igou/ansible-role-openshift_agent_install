---
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    work_dir: /tmp/molecule-openshift-agent-test
    boot_artifacts_dir: "{{ work_dir }}/cluster-manifests/boot-artifacts"
    expected_arch: x86_64
    expected_boot_url: "http://10.13.37.240/"
  tasks:
    - name: Check openshift-install binary exists
      ansible.builtin.stat:
        path: "{{ work_dir }}/openshift-install"
      register: _binary

    - name: Assert openshift-install binary exists
      ansible.builtin.assert:
        that:
          - _binary.stat.exists
          - _binary.stat.executable

    - name: Check iPXE script exists
      ansible.builtin.stat:
        path: "{{ boot_artifacts_dir }}/agent.{{ expected_arch }}.ipxe"
      register: _ipxe_script

    - name: Assert iPXE script exists
      ansible.builtin.assert:
        that:
          - _ipxe_script.stat.exists

    - name: Read iPXE script
      ansible.builtin.slurp:
        src: "{{ boot_artifacts_dir }}/agent.{{ expected_arch }}.ipxe"
      register: _ipxe_content

    - name: Assert iPXE script contains bootArtifactsBaseURL
      ansible.builtin.assert:
        that:
          - "expected_boot_url in _ipxe_content.content | b64decode"
        fail_msg: "iPXE script does not contain expected bootArtifactsBaseURL '{{ expected_boot_url }}'"
