---
dependency:
  name: galaxy
  options:
    requirements-file: extensions/molecule/provisioners/${PROVISIONER:-podman}/requirements.yml
    force: true
driver:
  name: default
  options:
    managed: true
    ansible_connection_options:
      connection: containers.podman.podman
platforms:
  - name: centos-stream9
    image: quay.io/centos/centos:stream9
    command: sleep 1d
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    create: ../provisioners/${PROVISIONER:-podman}/create.yml
    destroy: ../provisioners/${PROVISIONER:-podman}/destroy.yml
    verify: verify.yml
  inventory:
    links:
      group_vars: ../provisioners/${PROVISIONER:-podman}/group_vars/
verifier:
  name: ansible
scenario:
  name: gpg
  test_sequence:
    - dependency
    - create
    - converge
    - verify
    - destroy
